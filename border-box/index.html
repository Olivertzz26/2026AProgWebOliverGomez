<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Practica Box Model</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Panel de Productos</h1>

<div class="contenedor">

    <div class="card">
        <h2>Producto 1</h2>
        <p>Descripción corta del producto.</p>
        <button>Comprar</button>
    </div>

    <div class="card">
        <h2>Producto 2</h2>
        <p>Descripción corta del producto.</p>
        <button>Comprar</button>
    </div>

    <div class="card">
        <h2>Producto 3</h2>
        <p>Descripción corta del producto.</p>
        <button>Comprar</button>
    </div>

</div>

<!--
Parte 3 - observacion
Respuestas
1. ¿Cuántas tarjetas deberían caber en el contenedor?
Deberían caber 3 tarjetas, porque cada tarjeta tiene width:300px y el contenedor mide 906px.
2. ¿Cuántas realmente caben?
Solo caben 2 tarjetas en la misma línea.
3. ¿Por qué la tercera tarjeta se baja de línea?
Porque el modelo de caja (Box Model) suma el ancho del contenido, el padding y el borde. Entonces cada tarjeta ocupa más de 300px, 
por lo que tres tarjetas ya no caben dentro de los 906px del contenedor.
-->

<!--
Parte 4 — Análisis matemático

Cálculo del tamaño real de .card
width: 300px
padding: 20px + 20px = 40px
border: 10px + 10px = 20px
Tamaño real de cada tarjeta:
300 + 40 + 20 = 360px
Si hay 3 tarjetas:
360p × 3 = 1080px
Pero el contenedor mide:
906px
Conclusión:
Las tres tarjetas no caben dentro del contenedor,
por eso la tercera tarjeta se baja de línea y el layout se rompe.
-->

<!--
Parte 6 — Observación nuevamente

1. ¿Las 3 tarjetas caben ahora?
Sí, ahora las 3 tarjetas caben dentro del contenedor.
2. ¿Por qué?
Porque se aplicó box-sizing: border-box, lo que hace que
el padding y el border se incluyan dentro del width del elemento.
3. ¿Qué cambió exactamente?
Antes el width solo representaba el contenido y el padding
y el border se sumaban al tamaño total.
Con border-box:
width  contenido + padding + border
Entonces cada tarjeta sigue midiendo 300px en total.
Cálculo:
300px × 3 = 900px
Como el contenedor mide 906px,
las tres tarjetas ahora caben y el layout funciona correctamente.
-->

<!--
Parte 7 — Experimento avanzado

1. ¿Se rompe el layout sin border-box?
Sí, se rompe. 
Porque el padding y el border se suman al width (33.33%), 
haciendo que las tarjetas ocupen más espacio del disponible y 
las columnas se bajen de línea.
2. ¿Funciona correctamente con border-box?
Sí, funciona correctamente.
Porque border-box incluye el padding y el border dentro del width,
por lo que cada tarjeta sigue ocupando solo el 33.33% del contenedor.
3. ¿Por qué los frameworks CSS usan esta técnica?
Porque hace más fácil controlar el tamaño de los elementos,
evita que el layout se rompa y permite crear grids y columnas
de forma más predecible y responsive.
-->

<!--
Parte 8 — Experimento profesional (Flexbox)
1. ¿Qué sucede con border-box?
Con border-box el layout funciona correctamente.
Las tarjetas mantienen su tamaño dentro del contenedor porque
el padding y el border se incluyen dentro del width.
2. ¿Qué sucede sin border-box?
Sin border-box el padding y el border se suman al width,
por lo que las tarjetas ocupan más espacio del disponible
y el layout puede desacomodarse o bajar elementos de línea.
-->

<!--
Parte 9 — Experimento extremo

Observaciones al manipular el padding

1. Sin border-box
El padding y el border se suman al width del elemento.
Si el padding aumenta mucho, las tarjetas ocupan más espacio
y el layout se rompe más fácilmente.
Los elementos pueden bajarse de línea o desbordarse.

2. Con border-box
El padding y el border se incluyen dentro del width.
Aunque cambie el padding, la tarjeta conserva su ancho total.
El layout es más estable y predecible.

Conclusión
border-box ayuda a mantener el diseño ordenado,
incluso cuando se cambian valores grandes o pequeños de padding.
-->

<!--
Parte 10 — Conclusión

border-box permite que el ancho declarado sea el tamaño real del elemento,
porque incluye el contenido, padding y border dentro del width.

Esto evita errores en los layouts y hace que el diseño sea más estable
y predecible.

Por esta razón muchos frameworks CSS lo utilizan, como:

- Bootstrap
- Tailwind
- Normalize
- CSS Reset modernos
-->

</body>
</html>
