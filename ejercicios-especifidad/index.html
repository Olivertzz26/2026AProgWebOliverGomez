<!DOCTYPE html>
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios de especificidad CSS - Oliver Sebastian Gomez Martinez</title>
    <link rel="stylesheet" href="styles.css">
    </head>
    <body>

    <h1>Oliver Sebastian Gomez Martinez - 8° Semestre</h1>
    <h2>Ejercicios de especificidad en CSS</h2>

    <section>
    <h2>Ejercicio 1</h2>
    <div id="contenedor">
    <p class="texto" id="parrafo">Texto 1</p>
    <p class="texto">Texto 2</p>
    </div>
    <p class="texto">Texto 3</p>
    <!--
    Respuestas
    1. ¿De qué color se ve cada párrafo?
    Texto 1: morado
    Texto 2: morado
    Texto 3: azul
    2. Especificidad de cada regla
    p → (0,0,1)
    .texto → (0,1,0)
    #contenedor p → (1,0,1)
    #parrafo → (1,0,0)
    #contenedor .texto → (1,1,0)
    3. ¿Por qué se aplica cada color?
    Texto 1 y Texto 2: gana #contenedor .texto porque tiene mayor especificidad.
    Texto 3: gana .texto porque no está dentro de #contenedor.
    -->
    </section>
    <section>
    <h2>Ejercicio 2</h2>
    <ul>
    <li class="item" id="primero">Elemento 1</li>
    <li class="item">Elemento 2</li>
    <li>Elemento 3</li>
    </ul>
    <!--
    Respuestas
    1. Colores resultantes para cada <li>
    Elemento 1: fuchsia
    Elemento 2: teal
    Elemento 3: gray
    2. Especificidad de la regla 5
    li#primero.item → (1,1,1)
    3. ¿Qué ocurre si se intercambia el orden de las reglas 4 y 5?
    No cambia el resultado porque la regla 5 tiene mayor especificidad y seguirá aplicándose.
    -->
    </section>
    <section>
    <h2>Ejercicio 3</h2>
    <section id="main">
    <div class="caja">
    <p>Texto A</p>
    <p class="resultado">Texto B</p>
    </div>
    <p class="resultado">Texto C</p>
    </section>
    <!--
    Respuestas
    1. Determina el color de cada párrafo
    Texto A: aqua
    Texto B: indigo
    Texto C: indigo
    2. Reglas con la misma especificidad
    .resultado y #main p tienen la misma especificidad.
    ¿Cómo se resuelve?
    Cuando dos reglas tienen la misma especificidad,
    gana la que aparece después en el CSS.
    -->
    </section>
    <section>
    <h2>Ejercicio 4</h2>
    <article>
    <h2 class="titulo">Título</h2>
    <p class="contenido">Párrafo 1</p>
    <p class="contenido" id="ultimo">Párrafo 2</p>
    </article>
    <!--
    Respuestas
    1. Colores de cada elemento
    Título → color por defecto (no tiene regla CSS)
    Párrafo 1 → darkcyan
    Párrafo 2 → darkgoldenrod
    2. ¿Qué regla se aplica al párrafo con id "ultimo"? ¿Por qué?
    Se aplica: p#ultimo.contenido { color: darkgoldenrod; }
    Porque tiene mayor especificidad.
    3. Si se añade !important a la regla 2, ¿cambia algo?
    Sí. La regla .contenido { color: chocolate !important; }
    ganaría sobre las demás y ambos párrafos serían chocolate.
    -->
    </section>




 

</body>
</html>
